buildscript {
  ext.WifiScanner = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return WifiScanner[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.wifiscanner"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
}

// Patch the codegen-generated CMakeLists.txt to add c++_shared for NDK 27 compatibility.
// The generated CMakeLists does not include c++_shared which causes undefined symbol linker
// errors with NDK 27's stricter linking behaviour.
afterEvaluate {
  tasks.matching { it.name.startsWith("generateCodegenArtifactsFrom") }.configureEach {
    finalizedBy("patchCodegenCMakeLists")
  }

  task patchCodegenCMakeLists {
    doLast {
      def cmakeFile = file("${buildDir}/generated/source/codegen/jni/CMakeLists.txt")
      if (cmakeFile.exists()) {
        def content = cmakeFile.text
        // Only add c++_shared if it's not already there
        if (!content.contains("c++_shared")) {
          content = content.replace(
            "target_link_libraries(\n  react_codegen_WifiScannerSpec\n  fbjni",
            "target_link_libraries(\n  react_codegen_WifiScannerSpec\n  c++_shared\n  fbjni"
          )
          cmakeFile.text = content
          println("Patched codegen CMakeLists.txt with c++_shared")
        }
      }
    }
  }
}

